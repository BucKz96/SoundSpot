version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: soundspot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: soundspot
      POSTGRES_USER: soundspot
      POSTGRES_PASSWORD: soundspot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
